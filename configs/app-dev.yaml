# CDC Warehouse Platform — Development environment config

storage:
  type: hdfs
  warehouse_root: hdfs://localhost:8020/warehouse
  local_debug_root: data/lake

timezone:
  source: UTC
  warehouse: Asia/Shanghai
  offset_seconds: 28800

pipeline:
  default_process_date: ${BIZ_DT:-}
  lookback_days: 1

delay_gate:
  enabled: true
  max_delay_seconds: 900
  progress_root: data/progress

dolphinscheduler:
  endpoint: http://localhost:12345/dolphinscheduler
  token: ""
  audit_mode: false
  audit_dir: data/dolphinscheduler/audit
  username: admin
  password: dolphinscheduler123

logging:
  level: DEBUG
  format: text

alerts:
  channels: ${ALERT_CHANNELS:-file}
  target: ${ALERT_TARGET:-dba}
  email_to: ${SMTP_TO:-}
  outbox: ${ALERT_OUTBOX:-data/alerts/outbox.jsonl}
