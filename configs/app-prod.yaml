# CDC Warehouse Platform — Production environment overrides
# Merged on top of app.yaml when ENVIRONMENT=prod
# Secrets come from environment variables, NOT this file.

storage:
  type: hdfs
  warehouse_root: ${WAREHOUSE_HDFS_ROOT}
  webhdfs_endpoint: ${WEBHDFS_ENDPOINT}
  webhdfs_user: ${WEBHDFS_USER}

pipeline:
  default_process_date: ${BIZ_DT}
  lookback_days: 2

delay_gate:
  enabled: true
  max_delay_seconds: ${DELAY_GATE_MAX_SECONDS:-1800}
  progress_root: ${PROGRESS_ROOT:-/warehouse/progress}

dolphinscheduler:
  endpoint: ${DS_ENDPOINT}
  token: ${DS_TOKEN}
  audit_mode: false

logging:
  level: INFO
  format: json
