# CDC Warehouse Platform — Production environment config
# Secrets come from environment variables, NOT this file.

storage:
  type: hdfs
  warehouse_root: ${WAREHOUSE_HDFS_ROOT}
  webhdfs_endpoint: ${WEBHDFS_ENDPOINT}
  webhdfs_user: ${WEBHDFS_USER}

timezone:
  source: UTC
  warehouse: Asia/Shanghai
  offset_seconds: 28800

pipeline:
  default_process_date: ${BIZ_DT}
  lookback_days: 2

delay_gate:
  enabled: true
  max_delay_seconds: ${DELAY_GATE_MAX_SECONDS:-1800}
  progress_root: ${PROGRESS_ROOT:-hdfs://nameservice1/warehouse/progress}

dolphinscheduler:
  endpoint: ${DS_ENDPOINT}
  token: ${DS_TOKEN}
  audit_mode: false
  audit_dir: data/dolphinscheduler/audit

logging:
  level: INFO
  format: json

alerts:
  channels: ${ALERT_CHANNELS:-file}
  target: ${ALERT_TARGET:-dba}
  email_to: ${SMTP_TO:-}
  outbox: ${ALERT_OUTBOX:-data/alerts/outbox.jsonl}
