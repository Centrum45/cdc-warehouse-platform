# Nginx reverse proxy for CDC Warehouse Admin.
# Replace warehouse.example.com and certificate paths before production use.

upstream cdc_warehouse_admin {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name warehouse.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name warehouse.example.com;

    ssl_certificate /etc/letsencrypt/live/warehouse.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/warehouse.example.com/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy same-origin always;

    # Optional intranet allowlist. Uncomment and adjust for production.
    # allow 10.0.0.0/8;
    # allow 172.16.0.0/12;
    # allow 192.168.0.0/16;
    # deny all;

    client_max_body_size 20m;

    location / {
        proxy_pass http://cdc_warehouse_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
    }
}
