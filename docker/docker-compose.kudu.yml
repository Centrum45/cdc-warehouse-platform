services:
  kudu-master:
    image: apache/kudu:latest
    platform: linux/amd64
    container_name: cdc-kudu-master
    user: root
    command:
      - bash
      - -lc
      - >
        mkdir -p /var/lib/kudu/master &&
        chown -R kudu:kudu /var/lib/kudu &&
        exec runuser -u kudu -- kudu master run
        --fs_wal_dir=/var/lib/kudu/master
        --fs_data_dirs=/var/lib/kudu/master
        --rpc_bind_addresses=0.0.0.0:7051
        --rpc_advertised_addresses=kudu-master:7051
        --webserver_interface=0.0.0.0
        --webserver_port=8051
        --webserver_doc_root=/opt/kudu/www
        --unlock_unsafe_flags
        --time_source=system_unsync
        --logtostderr
    ports:
      - "7051:7051"
      - "8051:8051"
    volumes:
      - kudu-master-data:/var/lib/kudu/master
    networks:
      - cdc-net

  kudu-tserver:
    image: apache/kudu:latest
    platform: linux/amd64
    container_name: cdc-kudu-tserver
    user: root
    command:
      - bash
      - -lc
      - >
        mkdir -p /var/lib/kudu/tserver &&
        chown -R kudu:kudu /var/lib/kudu &&
        exec runuser -u kudu -- kudu tserver run
        --tserver_master_addrs=kudu-master:7051
        --fs_wal_dir=/var/lib/kudu/tserver
        --fs_data_dirs=/var/lib/kudu/tserver
        --rpc_bind_addresses=0.0.0.0:7050
        --rpc_advertised_addresses=kudu-tserver:7050
        --webserver_interface=0.0.0.0
        --webserver_port=8050
        --webserver_doc_root=/opt/kudu/www
        --block_cache_capacity_mb=128
        --memory_limit_hard_bytes=1073741824
        --unlock_unsafe_flags
        --time_source=system_unsync
        --logtostderr
    depends_on:
      - kudu-master
    ports:
      - "7050:7050"
      - "8050:8050"
    volumes:
      - kudu-tserver-data:/var/lib/kudu/tserver
    networks:
      - cdc-net

  impala:
    image: apache/kudu:impala-latest
    platform: linux/amd64
    container_name: cdc-impala
    command: ["impala"]
    environment:
      KUDU_MASTERS: kudu-master:7051
      TZ: Asia/Shanghai
    depends_on:
      - kudu-master
      - kudu-tserver
    ports:
      - "21050:21050"
      - "25000:25000"
      - "25010:25010"
      - "25020:25020"
    volumes:
      - impala-data:/var/lib/impala
    networks:
      - cdc-net

volumes:
  kudu-master-data:
  kudu-tserver-data:
  impala-data:

networks:
  cdc-net:
    name: cdc-net
