services:
  mysql:
    image: mysql:8.0
    container_name: cdc-warehouse-mysql
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cdc_warehouse_admin}
      TZ: Asia/Shanghai
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: cdc-warehouse-zookeeper
    environment:
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Shanghai
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: cdc-warehouse-kafka
    depends_on:
      - zookeeper
    environment:
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Shanghai
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 12

  maxwell:
    image: zendesk/maxwell:v1.41.2
    container_name: cdc-warehouse-maxwell
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Shanghai
    volumes:
      - ./maxwell/config.properties:/app/config.properties:ro
    command: ["bin/maxwell", "--config", "/app/config.properties"]

  admin:
    build:
      context: ..
      dockerfile: docker/springboot-admin/Dockerfile
    container_name: cdc-warehouse-admin
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Shanghai
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-cdc_warehouse_admin}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-root}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      WAREHOUSE_PROJECT_ROOT: /workspace
      HIVE_JDBC_URL: jdbc:hive2://hive-server:10000/default
      HIVE_USER: root
      HIVE_PASSWORD:
      IMPALA_JDBC_URL: jdbc:hive2://host.docker.internal:21050/realtime;transportMode=binary;auth=noSasl
      IMPALA_HOST: host.docker.internal
      IMPALA_PORT: 21050
      IMPALA_USER:
      IMPALA_PASSWORD:
      KUDU_MASTER_URL: http://localhost:8051
      IMPALA_UI_URL: http://localhost:25000
    ports:
      - "8080:8080"
    volumes:
      - ..:/workspace

  spark-streaming:
    build:
      context: ..
      dockerfile: docker/spark-streaming/Dockerfile
    image: cdc-warehouse-spark-streaming:dev
    container_name: cdc-warehouse-spark-streaming
    depends_on:
      kafka:
        condition: service_healthy
      maxwell:
        condition: service_started
    working_dir: /workspace
    environment:
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Shanghai
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-cdc.incremental.binlog}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LAKE_ROOT: ${LAKE_ROOT:-hdfs://hdfs-namenode:8020/warehouse}
      SPARK_STREAMING_INTERVAL_SECONDS: ${SPARK_STREAMING_INTERVAL_SECONDS:-5}
      SPARK_STREAMING_CHECKPOINT: ${SPARK_STREAMING_CHECKPOINT:-hdfs://hdfs-namenode:8020/warehouse/checkpoints/offline_sink}
      SPARK_KAFKA_PACKAGE: ${SPARK_KAFKA_PACKAGE:-org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1}
      SPARK_STARTING_OFFSETS: ${SPARK_STARTING_OFFSETS:-latest}
      SPARK_MAX_OFFSETS_PER_TRIGGER: ${SPARK_MAX_OFFSETS_PER_TRIGGER:-1000}
      SPARK_BAD_RECORDS_PATH: ${SPARK_BAD_RECORDS_PATH:-}
    volumes:
      - ..:/workspace
    healthcheck:
      test: ["CMD-SHELL", "spark-submit --version >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 10
    command:
      - sh
      - -c
      - |
        bash deploy/run_job.sh spark-streaming

  dolphinscheduler:
    image: apache/dolphinscheduler-standalone-server:3.2.1
    container_name: cdc-warehouse-dolphinscheduler
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Shanghai
      MASTER_MAX_SYSTEM_MEMORY_USAGE_PERCENTAGE: "1.0"
      MASTER_MAX_CPU_LOAD_AVG: "-1"
      MASTER_MAX_RESCUED_MEMORY: "-1"
    ports:
      - "12345:12345"
      - "25333:25333"
    volumes:
      - ds_logs:/opt/dolphinscheduler/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:12345/dolphinscheduler/actuator/health"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 120s

  ops-refresh:
    image: docker:27-cli
    container_name: cdc-warehouse-ops-refresh
    depends_on:
      - kafka
      - maxwell
      - spark-streaming
      - admin
    working_dir: /workspace
    environment:
      TZ: CST-8
    volumes:
      - ..:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - sh
      - -c
      - |
        while true; do
          sh scripts/refresh_ops_snapshot.sh > data/ops/refresher.log 2>&1 || true
          sleep 5
        done

volumes:
  mysql_data:
  ds_logs:
