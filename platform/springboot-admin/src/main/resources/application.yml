spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:cdc_warehouse_admin}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  freemarker:
    charset: UTF-8
    suffix: .ftl
    template-loader-path: classpath:/templates/

server:
  port: 8080

warehouse:
  project-root: ../..
  mysql:
    fallback-demo-data: false
  merge:
    audit-root: ${MERGE_AUDIT_ROOT:data/ops/merge_audit}
  actions:
    public-enabled: false
  validation:
    enabled: false
    require-project-root: true
    require-mysql: true
    require-ops-dir: false
  auth:
    admin-user: ${ADMIN_USER:admin}
    admin-pass: ${ADMIN_PASS:admin123}
    users: ${AUTH_USERS:}
    jwt-secret: ${JWT_SECRET:cdc-warehouse-platform-secret-key-2026-minimum-256-bit-length}
    jwt-expiration-ms: 86400000
    cookie-secure: ${COOKIE_SECURE:false}
    cookie-same-site: ${COOKIE_SAME_SITE:Lax}
  hive:
    jdbc-url: ${HIVE_JDBC_URL:jdbc:hive2://localhost:10000/default}
    username: ${HIVE_USER:root}
    password: ${HIVE_PASSWORD:}
  impala:
    jdbc-url: ${IMPALA_JDBC_URL:jdbc:hive2://localhost:21050/realtime;transportMode=binary;auth=noSasl}
    username: ${IMPALA_USER:}
    password: ${IMPALA_PASSWORD:}
    kudu-master-url: ${KUDU_MASTER_URL:http://localhost:8051}
    ui-url: ${IMPALA_UI_URL:http://localhost:25000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
