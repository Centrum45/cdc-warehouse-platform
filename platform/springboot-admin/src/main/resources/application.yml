spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/cdc_warehouse_admin?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  freemarker:
    charset: UTF-8
    suffix: .ftl
    template-loader-path: classpath:/templates/

server:
  port: 8080

warehouse:
  project-root: ../..
  mysql:
    fallback-demo-data: true
  auth:
    admin-user: admin
    admin-pass: admin123
    jwt-secret: cdc-warehouse-platform-secret-key-2026-minimum-256-bit-length
    jwt-expiration-ms: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
