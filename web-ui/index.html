<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CDC Warehouse Platform</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #f7f8fa; color: #1f2937; }
      header { padding: 18px 28px; background: #ffffff; border-bottom: 1px solid #e5e7eb; }
      main { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 61px); }
      nav { background: #111827; color: #d1d5db; padding: 20px; }
      nav div { padding: 10px 8px; border-radius: 6px; }
      nav div:first-child { background: #374151; color: #ffffff; }
      section { padding: 24px; }
      .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; }
      .card { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; }
      .label { color: #6b7280; font-size: 13px; }
      .value { font-size: 26px; font-weight: 700; margin-top: 8px; }
      table { width: 100%; border-collapse: collapse; margin-top: 18px; background: #ffffff; }
      th, td { padding: 12px; border-bottom: 1px solid #e5e7eb; text-align: left; }
      th { color: #6b7280; font-size: 13px; }
    </style>
  </head>
  <body>
    <header><strong>CDC Warehouse Platform</strong></header>
    <main>
      <nav>
        <div>任务配置</div>
        <div>元数据查询</div>
        <div>数据重放</div>
        <div>监控面板</div>
      </nav>
      <section>
        <div class="grid">
          <div class="card"><div class="label">ODS Merge</div><div class="value">OK</div></div>
          <div class="card"><div class="label">延迟监控</div><div class="value">3s</div></div>
          <div class="card"><div class="label">今日表更新</div><div class="value">1</div></div>
          <div class="card"><div class="label">异常字段</div><div class="value">0</div></div>
        </div>
        <table>
          <thead><tr><th>任务</th><th>类型</th><th>目标层</th><th>状态</th></tr></thead>
          <tbody>
            <tr><td>offline_sink</td><td>streaming</td><td>ods_binlog</td><td>running</td></tr>
            <tr><td>ods_merge</td><td>batch</td><td>ods</td><td>success</td></tr>
            <tr><td>warehouse_daily</td><td>batch</td><td>dim/dwd/dws/ads</td><td>ready</td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </body>
</html>
