<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CDC Warehouse Platform</title>
<style>
  :root {
    --bg: #f0f2f5; --card: #fff; --text: #1f2937; --muted: #6b7280;
    --accent: #3b82f6; --green: #10b981; --red: #ef4444; --amber: #f59e0b;
    --border: #e5e7eb; --nav-bg: #111827; --nav-text: #d1d5db;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); }
  header { padding: 16px 28px; background: var(--card); border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 18px; font-weight: 700; }
  header .badge { font-size: 12px; background: var(--green); color: #fff;
    padding: 4px 10px; border-radius: 12px; }
  main { display: grid; grid-template-columns: 200px 1fr; min-height: calc(100vh - 57px); }
  nav { background: var(--nav-bg); color: var(--nav-text); padding: 16px 0; }
  nav .nav-item { padding: 10px 20px; cursor: pointer; font-size: 14px;
    border-left: 3px solid transparent; transition: all .15s; }
  nav .nav-item:hover { background: #1f2937; color: #fff; }
  nav .nav-item.active { background: #374151; color: #fff; border-left-color: var(--accent); }
  section { padding: 20px 24px; overflow-y: auto; }
  .tab { display: none; }
  .tab.active { display: block; }
  .grid { display: grid; gap: 14px; }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-2 { grid-template-columns: repeat(2, 1fr); }
  .card { background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 18px; }
  .card h3 { font-size: 14px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
  .metric-value { font-size: 28px; font-weight: 700; }
  .metric-value.big { font-size: 36px; }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .status-dot.ok { background: var(--green); }
  .status-dot.warn { background: var(--amber); }
  .status-dot.fail { background: var(--red); }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
  th, td { padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; }
  th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; }
  tr:hover { background: #f9fafb; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600; }
  .tag-ok { background: #d1fae5; color: #065f46; }
  .tag-warn { background: #fef3c7; color: #92400e; }
  .tag-info { background: #dbeafe; color: #1e40af; }
  .bar-wrap { background: #e5e7eb; border-radius: 4px; height: 8px; margin-top: 4px; }
  .bar-fill { background: var(--accent); border-radius: 4px; height: 100%; transition: width .5s; }
  .layer-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
  .layer-label { width: 40px; font-weight: 700; font-size: 13px; text-transform: uppercase; }
  .layer-tables { font-size: 12px; color: var(--muted); }
  .refresh { font-size: 12px; color: var(--muted); cursor: pointer; }
  .refresh:hover { color: var(--accent); }
  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .error { color: var(--red); padding: 12px; background: #fef2f2; border-radius: 6px; }
  @media (max-width: 900px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<header>
  <div><h1>CDC Warehouse Platform</h1></div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span id="biz-dt" class="tag tag-info"></span>
    <span id="api-status" class="badge" style="background:var(--muted)">●</span>
  </div>
</header>
<main>
<nav>
  <div class="nav-item active" data-tab="dashboard">📊 Dashboard</div>
  <div class="nav-item" data-tab="pipeline">🔗 Pipeline Layers</div>
  <div class="nav-item" data-tab="metadata">📋 Metadata</div>
  <div class="nav-item" data-tab="tasks">⚙️ Tasks</div>
  <div class="nav-item" data-tab="monitors">🛡️ Monitors</div>
  <div class="nav-item" data-tab="data">🗄️ Data Browser</div>
</nav>
<section id="content">
  <div id="loading" class="loading">Loading...</div>
</section>
</main>

<script>
const API = 'http://127.0.0.1:8000';

async function fetchAPI(path) {
  const res = await fetch(`${API}${path}`);
  if (!res.ok) throw new Error(`${path}: ${res.status}`);
  return res.json();
}

// ── Navigation ─────────────────────────────────────────────

document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    showTab(el.dataset.tab);
  });
});

async function showTab(name) {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const html = await renderers[name]();
    content.innerHTML = html;
  } catch (e) {
    content.innerHTML = `<div class="error">Error: ${e.message}</div>`;
  }
}

// ── Renderers ──────────────────────────────────────────────

const renderers = {
  async dashboard() {
    const d = await fetchAPI('/api/dashboard');
    const m = d.metrics || {};
    const cards = [
      { label: 'GMV (日)', value: `¥${m.gmv || '—'}`, cls: 'big' },
      { label: '评论批次总计', value: m.comment_batch_total || '—' },
      { label: '优先批次', value: m.comment_batch_priority_total || '—' },
      { label: '付费用户', value: m.pay_user_cnt || '—' },
      { label: '累计 GMV', value: `¥${m.total_gmv || '—'}` },
      { label: '累计用户', value: m.total_user_cnt || '—' },
      { label: '人均订单', value: m.avg_order_per_user || '—' },
      { label: '业务日期', value: d.biz_dt || '—' },
    ];
    return `
      <h2 style="margin-bottom:16px;">数据看板</h2>
      <div class="grid grid-4">${cards.map(c => `
        <div class="card">
          <h3>${c.label}</h3>
          <div class="metric-value${c.cls ? ' ' + c.cls : ''}">${c.value}</div>
        </div>`).join('')}
      </div>
      <h3 style="margin-top:24px;margin-bottom:10px;">数据层状态</h3>
      <div class="grid grid-3">${Object.entries(d.layers || {}).map(([k,v]) => `
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <strong style="text-transform:uppercase;">${k}</strong>
            <span class="status-dot ${v.has_data ? 'ok' : 'warn'}"></span>
          </div>
          <div style="font-size:13px;color:var(--muted);margin-top:4px;">${v.table_count} tables ${v.has_data ? '✓' : '— no data'}</div>
        </div>`).join('')}
      </div>`;
  },

  async pipeline() {
    const layers = await fetchAPI('/api/layers');
    const maxRows = Math.max(1, ...layers.layers.map(l => l.total_rows));
    return `
      <h2 style="margin-bottom:16px;">全链路数据管道</h2>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap;">
        ${layers.layers.map((l, i) => `
          ${i > 0 ? '<span style="color:var(--muted);">→</span>' : ''}
          <div class="card" style="padding:12px 16px;min-width:120px;text-align:center;">
            <div style="font-weight:700;text-transform:uppercase;font-size:14px;">${l.layer}</div>
            <div class="status-dot ${l.total_rows > 0 ? 'ok' : 'warn'}"></div>
            <div style="font-size:12px;color:var(--muted);">${l.total_rows} rows</div>
          </div>`).join('')}
      </div>
      ${layers.layers.map(l => `
        <div class="card" style="margin-bottom:12px;">
          <h3 style="margin-bottom:8px;">${l.layer.toUpperCase()} — ${l.table_count} tables, ${l.total_rows} rows</h3>
          ${l.tables.map(t => `
            <div class="layer-row">
              <span class="tag ${t.has_data ? 'tag-ok' : 'tag-warn'}">${t.has_data ? 'OK' : '—'}</span>
              <span style="flex:1;">${t.table}</span>
              <span class="layer-tables">${t.rows} rows</span>
              <div class="bar-wrap" style="width:80px;">
                <div class="bar-fill" style="width:${maxRows ? (t.rows/maxRows*100) : 0}%;"></div>
              </div>
            </div>`).join('')}
        </div>`).join('')}`;
  },

  async metadata() {
    const data = await fetchAPI('/api/metadata');
    return `
      <h2 style="margin-bottom:16px;">表元数据</h2>
      <table><thead><tr>
        <th>数据库</th><th>表名</th><th>主键</th><th>字段数</th><th>ODS 表</th>
      </tr></thead><tbody>
      ${data.tables.map(t => `
        <tr>
          <td><strong>${t.source_database}</strong></td>
          <td>${t.source_table}</td>
          <td>${(t.primary_keys||[]).join(', ')}</td>
          <td>${t.columns}</td>
          <td><code>${t.ods_table}</code></td>
        </tr>`).join('')}
      </tbody></table>
      <div style="margin-top:12px;font-size:12px;color:var(--muted);">${data.count} tables</div>`;
  },

  async tasks() {
    const data = await fetchAPI('/api/tasks');
    const priorityLabel = {1: '高', 2: '中', 3: '低'};
    return `
      <h2 style="margin-bottom:16px;">任务配置</h2>
      <table><thead><tr>
        <th>ID</th><th>任务名</th><th>类型</th><th>调度</th><th>优先级</th><th>状态</th>
      </tr></thead><tbody>
      ${data.tasks.map(t => `
        <tr>
          <td>${t.id}</td>
          <td><strong>${t.taskName}</strong></td>
          <td><span class="tag tag-info">${t.taskType}</span></td>
          <td>${t.schedule}</td>
          <td><span class="tag ${t.priority === 1 ? 'tag-warn' : 'tag-info'}">P${t.priority}</span></td>
          <td><span class="tag ${t.enabled ? 'tag-ok' : 'tag-warn'}">${t.enabled ? '启用' : '停用'}</span></td>
        </tr>`).join('')}
      </tbody></table>
      <div style="margin-top:12px;font-size:12px;color:var(--muted);">${data.count} tasks</div>`;
  },

  async monitors() {
    const [items, results] = await Promise.all([
      fetchAPI('/api/monitors'),
      fetchAPI('/api/monitors/results')
    ]);
    const mkRow = r => `
      <tr>
        <td>${r.created_at || '—'}</td>
        <td>${r.monitor_type || '—'}</td>
        <td>${r.database || '—'}.${r.table || '—'}</td>
        <td><span class="tag ${r.status === 'OK' ? 'tag-ok' : 'tag-warn'}">${r.status || '—'}</span></td>
        <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${r.message || ''}">${r.message || '—'}</td>
        <td>${r.metric_value || '—'}</td>
      </tr>`;
    return `
      <h2 style="margin-bottom:16px;">监控面板</h2>
      <div class="grid grid-2" style="margin-bottom:20px;">
        ${items.monitors.map(m => `
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <strong>${m.name}</strong>
            <span class="tag ${m.enabled ? 'tag-ok' : 'tag-warn'}">${m.enabled ? '启用' : '停用'}</span>
          </div>
          <div style="font-size:12px;color:var(--muted);margin-top:4px;">${m.description}</div>
          <div style="font-size:11px;margin-top:6px;font-family:monospace;color:var(--muted);">${m.schedule}</div>
        </div>`).join('')}
      </div>
      <h3 style="margin-bottom:10px;">监控结果 (${results.count})</h3>
      <table><thead><tr>
        <th>时间</th><th>类型</th><th>表</th><th>状态</th><th>消息</th><th>指标值</th>
      </tr></thead><tbody>${results.results.map(mkRow).join('')}</tbody></table>`;
  },

  async data() {
    const layers = await fetchAPI('/api/data');
    return `
      <h2 style="margin-bottom:16px;">数据浏览器</h2>
      ${layers.layers.map(l => `
        <div class="card" style="margin-bottom:12px;">
          <h3 style="margin-bottom:8px;text-transform:uppercase;">${l.layer} — ${l.table_count} tables</h3>
          ${l.tables.map(t => `
            <div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;font-family:monospace;">
              🗂️ ${t}
            </div>`).join('')}
        </div>`).join('')}`;
  }
};

// ── Init ────────────────────────────────────────────────────

async function init() {
  try {
    const d = await fetchAPI('/api/dashboard');
    document.getElementById('biz-dt').textContent = d.biz_dt || '—';
    document.getElementById('api-status').textContent = '● Connected';
    document.getElementById('api-status').style.background = 'var(--green)';
  } catch(e) {
    document.getElementById('api-status').textContent = '● Offline';
    document.getElementById('api-status').style.background = 'var(--red)';
  }
  showTab('dashboard');
}

init();
</script>
</body>
</html>
